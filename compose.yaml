services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ddp0_grader
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ddp0_grader"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "redis"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Pulling and starting this short-lived service guarantees the image used by
  # pkg/runner is available on the same Docker daemon as the API's socket.
  runner-image:
    image: python:3.12-slim
    command: ["python", "--version"]
    restart: "no"

  api:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ddp0_grader
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: redis
      PORT: "8080"
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-unsafe-default-key}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-}
      AUTH_JWT_USER_ID_CLAIM: ${AUTH_JWT_USER_ID_CLAIM:-user_id}
      AUTH_JWT_TOKEN_TYPE_CLAIM: ${AUTH_JWT_TOKEN_TYPE_CLAIM:-token_type}
      AUTH_JWT_ACCESS_TOKEN_TYPE: ${AUTH_JWT_ACCESS_TOKEN_TYPE:-access}
      DJANGO_ADMIN_ME_URL: ${DJANGO_ADMIN_ME_URL:-http://host.docker.internal:8000/api/admin/me/}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      runner-image:
        condition: service_completed_successfully
    # Docker-outside-of-Docker: docker-cli in this container uses the host
    # daemon. /tmp is shared so bind mounts created by pkg/runner are visible
    # to that daemon when it starts python:3.12-slim.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
